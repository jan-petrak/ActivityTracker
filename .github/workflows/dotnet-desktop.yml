# Builds and publishes ActivityTracker (WPF, net10.0-windows, win-x64).
# Triggered on every push/PR to master.
# The published self-contained-false exe is uploaded as a build artifact.

name: .NET Core Desktop

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: windows-latest

    env:
      Project_Path: src/ActivityTracker/ActivityTracker.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore $env:Project_Path

    - name: Build
      run: dotnet build $env:Project_Path -c Release --no-restore

    - name: Publish
      run: dotnet publish $env:Project_Path -c Release -r win-x64 --self-contained false -o publish

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ActivityTracker
        path: publish/
